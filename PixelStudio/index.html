<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="app">
    <header>
      <div class="logo">
        <span class="logo-pixel">P</span><span class="logo-pixel">I</span><span class="logo-pixel">X</span><span class="logo-pixel">E</span><span class="logo-pixel">L</span>
        <span class="logo-space"> </span>
        <span class="logo-studio">STUDIO</span>
      </div>
    </header>

    <div class="workspace">

      <!-- Toolbar -->
      <aside class="toolbar">
        <div class="tool-section">
          <button class="tool-btn active" id="btn-pen" title="Pen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            <span>Pen</span>
          </button>
          <button class="tool-btn" id="btn-eraser" title="Gum">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 20H7L3 16l11-11 6 6-4 4"/><path d="m6.5 17.5 5-5"/>
            </svg>
            <span>Gum</span>
          </button>
        </div>

        <div class="tool-section">
          <label class="color-label" for="colorPicker">Kleur</label>
          <input type="color" id="colorPicker" value="#e63946" />

        </div>

        <div class="tool-section">
          <button class="action-btn" id="btn-clear">Wis alles</button>
        </div>

      </aside>

      <!-- Canvas -->
      <main class="canvas-wrap">
        <canvas id="pixelCanvas"></canvas>
      </main>

    </div>
  </div>

  <script src="js/Pixel.js"></script>
  <script src="js/Grid.js"></script>
  <script src="js/Tool.js"></script>
  <script src="js/App.js"></script>
  <script src="main.js"></script>
</body>
</html>
